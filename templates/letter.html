<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세인쌤의 메모</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="phone">
        <div class="top-bar">
            <a href="/" class="back-link">‹ 메모</a>
            <span class="menu">···</span>
        </div>

        <main class="note">
            <p class="date">세인쌤이 남기는 메모</p>

            <h1 class="letter-title">To. 동아공고 친구들</h1>

            <div class="letter-box">
                <p>
                    얘들아 안녕! 세인쌤이야.
                </p>
                <p>
                    짧은 시간이었지만 너희랑 함께 수업하고,
                    학교에서 마주치고, 이런저런 이야기를 나눌 수 있어서
                    정말 고마웠어.
                </p>
                <p>
                    선생님에게 마지막으로 하고 싶은 말이 있다면
                    편하게 메모처럼 남겨줘.
                    내용은 선생님만 볼 수 있으니까 부담 갖지 않아도 돼.
                </p>
                <p>
                    너희의 하루하루를 진심으로 응원할게.
                    고마웠어 :)
                </p>
            </div>

            <a href="/info" class="start-btn">다음</a>
        </main>
    </div>
