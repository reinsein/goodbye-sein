<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메모 작성</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="phone">
        <div class="top-bar">
            <a href="/info" class="back-link">‹ 메모</a>
            <span class="menu">···</span>
        </div>

        <main class="note">
            <p class="date">{{ student_id }} {{ name }}님의 메모</p>

            {% if mode == "edit" %}
                <h1 class="letter-title">메모 수정하기</h1>
            {% else %}
                <h1 class="letter-title">To. 세인쌤</h1>
            {% endif %}

            <form action="/submit" method="POST" class="write-form" enctype="multipart/form-data">

                <input type="hidden" name="student_id" value="{{ student_id }}">
                <input type="hidden" name="name" value="{{ name }}">
                <input type="hidden" name="edit_password" value="{{ edit_password }}">

                <textarea
                    name="message"
                    maxlength="500"
                    placeholder="세인쌤에게 하고 싶은 말을 적어주세요."
                    required
                >{{ message }}</textarea>

                <div class="count-box">
                    <span id="charCount">0</span>/500
                </div>

                <label class="photo-label">사진 첨부 선택</label>

                <input
                    type="file"
                    name="photos"
                    accept="image/*"
                    class="photo-input"
                >

                <p class="photo-help">
                    사진은 선택 첨부예요.<br>
                    JPG, PNG 파일만 가능 / 최대 1장 / 5MB 이하
                </p>

                <button type="submit" class="start-btn">
                    {% if mode == "edit" %}
                        수정 완료하기
                    {% else %}
                        게시하기
                    {% endif %}
                </button>

            </form>
        </main>
    </div>

    <script>
        const textarea = document.querySelector("textarea");
        const charCount = document.querySelector("#charCount");

        charCount.textContent = textarea.value.length;

        textarea.addEventListener("input", () => {
            charCount.textContent = textarea.value.length;
        });
    </script>
</body>
</html>
